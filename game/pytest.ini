[pytest]
# Pytest configuration for BattleBlitz.
# Run with:  pytest            (from game/)
#            pytest -m unit   (only unit tests)
#            pytest -k utils  (only files whose name contains 'utils')
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    unit: pure-function tests, no DB / network
    integration: tests that touch the DB or HTTP layer
    asyncio: async tests (auto-applied when asyncio_mode=auto)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
